<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markedsstræde — Timeregnskab 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
header{background:#1B2631;color:#fff;padding:.9rem 1.2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;position:sticky;top:0;z-index:100}
header h1{font-size:1rem;font-weight:500;letter-spacing:.02em}
.person-btns{display:flex;gap:.35rem}
.person-btn{padding:.35rem .85rem;border-radius:20px;border:1.5px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-size:.82rem;cursor:pointer;transition:all .15s}
.person-btn.active-kv{background:#185FA5;border-color:#185FA5}
.person-btn.active-mj{background:#3B6D11;border-color:#3B6D11}
.person-btn.active-tm{background:#993C1D;border-color:#993C1D}
.person-btn:hover{background:rgba(255,255,255,.12)}
.sync-status{font-size:.72rem;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:.3rem}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4CAF50}
.sync-dot.syncing{background:#FFC107;animation:pulse .8s infinite}
.sync-dot.error{background:#F44336}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.tabs{display:flex;background:#fff;border-bottom:1px solid #e8e8e0;padding:0 1rem;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:.65rem .9rem;font-size:.82rem;color:#888;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s;flex-shrink:0}
.tab.active{color:#1B2631;border-bottom-color:#1B2631;font-weight:600}

main{max-width:860px;margin:0 auto;padding:1rem}

.btn{background:#1B2631;color:#fff;border:none;border-radius:6px;padding:.4rem .9rem;font-size:.82rem;cursor:pointer;white-space:nowrap}
.btn:hover{background:#2c3e50}
.btn-success{background:#3B6D11}
.btn-sm{padding:.3rem .6rem;font-size:.75rem}

.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1rem}
.stat-card{background:#fff;border-radius:10px;padding:.9rem 1rem;border:1px solid #e8e8e0}
.stat-label{font-size:.7rem;color:#999;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.3rem}
.stat-value{font-size:1.5rem;font-weight:600}
.stat-sub{font-size:.72rem;color:#999;margin-top:.15rem}
.pos{color:#1D6A39}.neg{color:#C0392B}.neu{color:#333}

.ferie-card{background:#fff;border-radius:10px;padding:.9rem 1rem;border:1px solid #e8e8e0;margin-bottom:1rem}
.ferie-card-title{font-size:.72rem;color:#999;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.8rem}
.ferie-row{margin-bottom:.55rem}
.ferie-hdr{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:.2rem}
.ferie-name{font-weight:600}
.ferie-nums{color:#888}
.ferie-track{height:7px;background:#f0f0eb;border-radius:4px;overflow:hidden}
.ferie-fill{height:100%;border-radius:4px;transition:width .5s ease}
.fill-kv{background:#185FA5}.fill-mj{background:#3B6D11}.fill-tm{background:#993C1D}

.month-card{background:#fff;border-radius:10px;border:1px solid #e8e8e0;overflow:hidden;margin-bottom:1rem}
.month-hdr{background:#1B2631;color:#fff;padding:.6rem 1rem;font-weight:600;font-size:.9rem}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{background:#f8f8f4;color:#777;font-weight:600;padding:.45rem .5rem;text-align:center;border-bottom:1px solid #eee;font-size:.72rem;text-transform:uppercase;letter-spacing:.03em}
td{padding:.38rem .5rem;text-align:center;border-bottom:1px solid #f4f4f0;vertical-align:middle}
tr.week-sep td{background:#f8f8f4;color:#999;font-size:.72rem;text-align:left;padding:.25rem .5rem;font-weight:600}
tr.weekend td{color:#ccc;background:#fafaf8}
td.dato-cell{text-align:left;font-weight:500;color:#555;white-space:nowrap}
td.dag-cell{color:#aaa;font-size:.75rem}
td.norm-cell{color:#aaa}
td.free-lbl{color:#ddd;font-size:.72rem}
input.delta-inp{width:50px;border:1px solid #c8ddf0;border-radius:5px;padding:.22rem .3rem;text-align:center;font-size:.8rem;background:#EAF4FF;font-family:inherit;-moz-appearance:textfield}
input.ferie-inp{width:50px;border:1px solid #bde0b5;border-radius:5px;padding:.22rem .3rem;text-align:center;font-size:.8rem;background:#F0F8EC;font-family:inherit;-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
input:focus{outline:none;background:#fff}
td.actual-cell{font-weight:600;color:#333}
.spinner{width:28px;height:28px;border:3px solid #eee;border-top-color:#1B2631;border-radius:50%;animation:spin .7s linear infinite;margin:3rem auto}
@keyframes spin{to{transform:rotate(360deg)}}
#loading{text-align:center;padding:2rem;color:#999}

.alert{padding:.6rem .9rem;border-radius:8px;font-size:.8rem;margin-bottom:.8rem}
.alert-info{background:#EAF4FF;border:1px solid #b8d4f0;color:#185FA5}
.alert-warn{background:#FEF9E7;border:1px solid #F5CBA7;color:#8a6000}

@media(max-width:580px){
  .grid3{grid-template-columns:1fr 1fr}
  th,td{padding:.3rem .3rem;font-size:.72rem}
  input.delta-inp,input.ferie-inp{width:40px;font-size:.72rem}
  .stat-value{font-size:1.2rem}
}
</style>
</head>

  <h1>Markedsstræde — Timeregnskab 2026</h1>

</header>

async function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';

  // Hent lokalt cache
  const local = localStorage.getItem('timedata_v2');
  if (local) allData = JSON.parse(local);

  if (sbClient) {
    setSyncStatus('syncing', 'Henter...');
    try {
      const { data, error } = await sbClient.from('timeregistrering').select('*');
      if (error) throw error;
      data.forEach(r => {
        if (!allData[r.dato]) allData[r.dato] = {};
        allData[r.dato][r.person] = { delta: r.delta, ferie: r.ferie };
      });
      saveLocal();
      setSyncStatus('ok', 'Synkroniseret');
      document.getElementById('offline-alert').style.display = 'none';

      // Præudfyld eksisterende data hvis tabellen er tom
      if (data.length === 0 && PREFILL_DATA.length > 0) {
        await prefillData();
      }
    } catch(e) {
      setSyncStatus('error', 'Offline');
      document.getElementById('offline-alert').style.display = 'block';
    }
  } else {
    // Ingen Supabase — brug prefill som fallback
    if (Object.keys(allData).length === 0 && PREFILL_DATA.length > 0) {
      PREFILL_DATA.forEach(r => {
        if (!allData[r.dato]) allData[r.dato] = {};
        allData[r.dato][r.person] = { delta: r.delta, ferie: r.ferie };
      });
      saveLocal();
    }
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  render();
}

function setVal(dato, person, field, val) {
  if (!allData[dato]) allData[dato] = {};
  if (!allData[dato][person]) allData[dato][person] = { delta: null, ferie: null };
  allData[dato][person][field] = val === '' ? null : (val === null ? null : parseFloat(val));
  saveLocal();
  updateSummaryCards();

  const qkey = dato + '_' + person;
  saveQueue[qkey] = { dato, person, ...allData[dato][person] };
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushQueue, 1000);
  setSyncStatus('syncing', 'Gemmer...');
}

async function flushQueue() {
  if (!sbClient) { setSyncStatus('ok', 'Lokalt gemt'); return; }
  const rows = Object.values(saveQueue);
  saveQueue = {};
  try {
    const { error } = await sbClient.from('timeregistrering').upsert(
      rows.map(r => ({ dato: r.dato, person: r.person, delta: r.delta ?? null, ferie: r.ferie ?? null })),
      { onConflict: 'dato,person' }
    );
    if (error) throw error;
    setSyncStatus('ok', 'Gemt ✓');
  } catch(e) {
    setSyncStatus('error', 'Fejl ved gem');
    // Sæt tilbage i kø
    rows.forEach(r => { saveQueue[r.dato+'_'+r.person] = r; });
  }
}

function calcSummary() {
  const result = {};
  ['KV','MJ','TM'].forEach(p => {
    let faktiskSum = 0, ferieSum = 0;
    Object.entries(SCHEDULE).forEach(([dato, norms]) => {
      const norm = norms[p] || 0;
      const delta = getVal(dato, p, 'delta');
      const ferie = getVal(dato, p, 'ferie') || 0;
      // Saldo per dag:
      // - Ingen ferie: saldo = delta (timeafvigelse fra norm)
      // - Med ferie: ferie neutraliserer normen → saldo = delta + ferie - norm
      //   (så 8t ferie på en 8t normdag giver saldo=0)
      const saldoBidrag = ferie > 0
        ? (delta !== null ? delta : 0) + ferie - norm
        : (delta !== null ? delta : 0);
      faktiskSum += saldoBidrag;
      ferieSum += ferie;
    });
    result[p] = { saldo: Math.round(faktiskSum * 10) / 10, ferie: ferieSum };
  });
  return result;
}

  // Linje-path
  let pathD = `M ${toX(0)} ${toY(0)}`;
  for (let i = 1; i <= 12; i++) pathD += ` L ${toX(i)} ${toY(punkter[i])}`;

  // Area under kurven
  let areaD = `M ${toX(0)} ${toY(0)}` + pathD.slice(1) + ` L ${toX(12)} ${toY(0)} Z`;

  // Grid linjer ved 57, 114, 171, 228
  const gridLines = [57, 114, 171, 228].map(v => `
    <line x1="${PL}" y1="${toY(v)}" x2="${W-PR}" y2="${toY(v)}" stroke="#e8e8e0" stroke-width="1"/>
    <text x="${PL-5}" y="${toY(v)+4}" text-anchor="end" font-size="9" fill="#bbb">${v}</text>`).join('');

  // Nuværende måned markering
  const nu = new Date().getMonth();
  const nuX = toX(nu + 1);
  const nuMark = `<line x1="${nuX}" y1="${PT}" x2="${nuX}" y2="${PT+gH}" stroke="#e0e0d8" stroke-width="1" stroke-dasharray="3,3"/>`;

  // Loft-linje
  const loftY = toY(228);
  const loftLinje = `<line x1="${PL}" y1="${loftY}" x2="${W-PR}" y2="${loftY}" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="${W-PR+2}" y="${loftY+4}" font-size="9" fill="#C0392B">228t</text>`;

  // X-akse labels (midten af hver måned)
  const xLabels = måneder.map((m, i) => `<text x="${toX(i) + xStep/2}" y="${PT+gH+18}" text-anchor="middle" font-size="9" fill="#aaa">${m}</text>`).join('');

  const wrap = document.createElement('div');
  wrap.id = 'fravær-kurve';
  wrap.className = 'month-card';
  wrap.style.marginBottom = '.75rem';
    wrap.innerHTML = `
    <div class="month-hdr">Akkumuleret fravær — ${p} 2026</div>
    <div style="padding:.75rem .5rem .25rem">
    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">
      ${gridLines}
      ${nuMark}
      ${loftLinje}
      <defs>
        <linearGradient id="grad-${p}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity=".25"/>
          <stop offset="100%" stop-color="${color}" stop-opacity=".03"/>
        </linearGradient>
      </defs>
      <path d="${areaD}" fill="url(#grad-${p})"/>
      <path d="${pathD}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${punkter.map((v,i) => i===0?'':('<circle cx="'+toX(i)+'" cy="'+toY(v)+'" r="3" fill="'+color+'"/>'))  .join('')}
      ${xLabels}
      <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+gH}" stroke="#e0e0d8" stroke-width="1"/>
      <line x1="${PL}" y1="${PT+gH}" x2="${W-PR}" y2="${PT+gH}" stroke="#e0e0d8" stroke-width="1"/>
    </svg>
    </div>`;
  return wrap;
}

function buildMonthTable() {
  const m = currentMonth;
  const wrap = document.createElement('div');
  wrap.className = 'month-card';
  wrap.innerHTML = `<div class="month-hdr">${MONTH_DK[m]} ${YEAR} — ${currentPerson}</div>`;

  const table = document.createElement('table');
  table.innerHTML = `<thead><tr>
    <th style="text-align:left">Dato</th><th>Dag</th>
    <th>Norm</th><th>+/−</th><th>Faktisk</th><th>Ferie/kursus</th>
  </tr></thead>`;
  const tbody = document.createElement('tbody');

  const daysInMonth = new Date(YEAR, m + 1, 0).getDate();
  let lastWeek = null;

  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(YEAR, m, day);
    const wd = date.getDay();
    const isWeekend = wd === 0 || wd === 6;
    const dateStr = `${YEAR}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isoWeek = getISOWeek(date);

    if (isoWeek !== lastWeek && !isWeekend) {
      lastWeek = isoWeek;
      const sepRow = tbody.insertRow();
      sepRow.className = 'week-sep';
      const sepCell = sepRow.insertCell();
      sepCell.colSpan = 6;
      sepCell.textContent = `Uge ${isoWeek}`;
    }

    const tr = tbody.insertRow();
    if (isWeekend) tr.className = 'weekend';

    const norm = SCHEDULE[dateStr]?.[currentPerson] || 0;
    const isFreeDay = !isWeekend && norm === 0;
    const delta = getVal(dateStr, currentPerson, 'delta');
    const ferie = getVal(dateStr, currentPerson, 'ferie');
    const faktisk = norm + (delta !== null ? delta : 0);

    const tdDato = tr.insertCell(); tdDato.className = 'dato-cell';
    tdDato.textContent = `${String(day).padStart(2,'0')}.${String(m+1).padStart(2,'0')}`;
    const tdDag = tr.insertCell(); tdDag.className = 'dag-cell';
    tdDag.textContent = DAY_DK[wd === 0 ? 6 : wd - 1];

    if (isWeekend) {
      const tdW = tr.insertCell(); tdW.colSpan = 4; tdW.className = 'free-lbl'; tdW.textContent = 'Weekend';
      continue;
    }

    const tdNorm = tr.insertCell(); tdNorm.className = 'norm-cell';
    if (isFreeDay) {
      tdNorm.textContent = '—';
      const tdD = tr.insertCell(); tdD.className = 'free-lbl'; tdD.textContent = 'Fri';
      const tdA = tr.insertCell();
      const tdF = tr.insertCell();
    } else {
      tdNorm.textContent = norm;

      // Delta input
      const tdD = tr.insertCell();
      const inpD = document.createElement('input');
      inpD.className = 'delta-inp'; inpD.type = 'number'; inpD.step = '0.5';
      inpD.placeholder = '0';
      if (delta !== null) inpD.value = delta;
      const tdAkt = tr.insertCell(); tdAkt.className = 'actual-cell';
      tdAkt.textContent = faktisk.toFixed(1);
      inpD.addEventListener('change', () => {
        setVal(dateStr, currentPerson, 'delta', inpD.value);
        tdAkt.textContent = (norm + (inpD.value === '' ? 0 : parseFloat(inpD.value))).toFixed(1);
      });
      tdD.appendChild(inpD);

      // Ferie input
      const tdFerie = tr.insertCell();
      const inpF = document.createElement('input');
      inpF.className = 'ferie-inp'; inpF.type = 'number'; inpF.step = '0.5';
      inpF.placeholder = '0';
      if (ferie !== null) inpF.value = ferie;
      inpF.addEventListener('change', () => setVal(dateStr, currentPerson, 'ferie', inpF.value));
      tdFerie.appendChild(inpF);
    }
  }
  table.appendChild(tbody);
  wrap.appendChild(table);
  return wrap;
}

function getISOWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}
